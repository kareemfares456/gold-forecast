services:
  - type: web
    name: gold-forecaster
    runtime: python
    buildCommand: "pip install uv && uv pip install --system -r backend/requirements.txt && cd frontend && npm ci && npm run build"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
